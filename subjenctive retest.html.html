<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXISOLVE 가정법 재시험</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
:root{--paper:#f4efe6;--paper2:#ece4d5;--ink:#211d18;--ink2:#5a5247;--line:#d6ccb8;
--accent:#b3502d;--accent2:#1f6a5e;--gold:#c08a2d;--ok:#1f6a5e;--no:#b3502d;--card:#fbf8f1;}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans KR',sans-serif;color:var(--ink);
background:radial-gradient(circle at 12% 0%,rgba(192,138,45,.07),transparent 40%),
radial-gradient(circle at 88% 8%,rgba(31,106,94,.06),transparent 42%),var(--paper);
line-height:1.6;padding-bottom:140px;}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}
header{padding:54px 0 26px;text-align:center}
header .kicker{font-family:'Fraunces',serif;letter-spacing:.42em;font-size:12px;text-transform:uppercase;color:var(--accent);font-weight:600}
header h1{font-family:'Gowun Batang',serif;font-weight:700;font-size:32px;margin:10px 0 4px;letter-spacing:-.5px}
header .sub{color:var(--ink2);font-size:15px}
.meta{display:flex;justify-content:center;margin-top:22px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card)}
.meta div{padding:12px 22px;border-right:1px solid var(--line);text-align:center}
.meta div:last-child{border-right:none}
.meta b{display:block;font-family:'Fraunces',serif;font-size:22px;color:var(--accent2)}
.meta span{font-size:12px;color:var(--ink2);letter-spacing:.05em}
.namerow{display:flex;align-items:center;gap:10px;margin:24px 0 6px}
.namerow label{font-weight:600;font-size:14px;white-space:nowrap}
.namerow input{flex:1;border:none;border-bottom:1.5px solid var(--line);background:transparent;font-family:inherit;font-size:15px;padding:8px 4px;color:var(--ink)}
.namerow input:focus{outline:none;border-color:var(--accent)}
.q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:16px 0;transition:border-color .25s,box-shadow .25s}
.q.answered{border-color:var(--accent2)}
.q.flag{box-shadow:0 0 0 2px rgba(179,80,45,.25)}
.qhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qnum{font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--accent);letter-spacing:.1em}
.fmt{font-size:11px;background:var(--paper2);color:var(--ink2);padding:2px 9px;border-radius:20px;letter-spacing:.03em}
.stem{font-size:16px;margin:4px 0 12px}
.seg-u{border-bottom:1.6px solid var(--ink);padding:0 1px;white-space:nowrap}
.seg-u .sup{font-family:'Fraunces',serif;font-size:.62em;color:var(--accent);vertical-align:super;margin-right:1px;font-weight:600}
.opt{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:9px;cursor:pointer;transition:background .15s;font-size:15px}
.opt:hover{background:var(--paper2)}
.opt input{display:none}
.bul{font-family:'Fraunces',serif;flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-size:13px;color:var(--ink2);transition:all .15s;margin-top:1px}
.opt input:checked + .bul{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.opt .txt{flex:1}
.q.graded .opt{cursor:default}.q.graded .opt:hover{background:transparent}
.opt.correct .bul{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.correct{background:rgba(31,106,94,.08)}
.opt.wrong .bul{background:var(--no);border-color:var(--no);color:#fff}
.opt.wrong{background:rgba(179,80,45,.08)}
.explain{margin-top:10px;padding:10px 14px;border-left:3px solid var(--accent2);background:var(--paper2);border-radius:0 8px 8px 0;font-size:13.5px;display:none}
.q.graded .explain{display:block}
.explain b{color:var(--accent2)}.explain .fix{font-family:'Fraunces',serif;color:var(--no)}
.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(33,29,24,.96);backdrop-filter:blur(8px);color:var(--paper);padding:14px 20px;z-index:50}
.bar .inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:16px}
.prog{flex:1}
.prog .ptrack{height:6px;background:rgba(255,255,255,.18);border-radius:6px;overflow:hidden}
.prog .pfill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:6px;transition:width .3s}
.prog .ptxt{font-size:12px;margin-top:5px;color:#cfc6b6}
.btn{font-family:'IBM Plex Sans KR';font-weight:600;font-size:15px;border:none;cursor:pointer;padding:13px 26px;border-radius:30px;background:var(--gold);color:#211d18;transition:transform .12s,opacity .2s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.ghost{background:transparent;color:var(--paper);border:1.4px solid rgba(255,255,255,.4)}
#result{display:none;margin:34px 0 10px}
.scorecard{background:var(--ink);color:var(--paper);border-radius:20px;padding:34px 30px;text-align:center;position:relative;overflow:hidden}
.scorecard::after{content:"AXIS";position:absolute;right:-10px;bottom:-22px;font-family:'Fraunces',serif;font-size:120px;font-weight:600;opacity:.06;letter-spacing:-.04em}
.scorecard .label{font-family:'Fraunces',serif;letter-spacing:.3em;font-size:12px;color:var(--gold);text-transform:uppercase}
.scorecard .score{font-family:'Fraunces',serif;font-size:74px;line-height:1;margin:8px 0;font-weight:600}
.scorecard .score small{font-size:26px;opacity:.55}
.verdict{display:inline-block;margin-top:6px;padding:6px 20px;border-radius:24px;font-weight:700;font-size:15px;letter-spacing:.05em}
.verdict.pass{background:var(--accent2);color:#fff}.verdict.fail{background:var(--accent);color:#fff}
.scorecard .meta2{margin-top:14px;font-size:13px;color:#cfc6b6}
.block{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin-top:18px}
.block h3{font-family:'Gowun Batang',serif;font-size:17px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.block h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.area{margin:11px 0}
.area .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px}
.area .top .n{font-family:'Fraunces',serif;color:var(--ink2)}
.area .top .cd{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;border-radius:5px;background:var(--ink);color:var(--paper);font-family:'Fraunces',serif;font-size:11px;margin-right:7px}
.area .track{height:9px;background:var(--paper2);border-radius:6px;overflow:hidden}
.area .fill{height:100%;border-radius:6px;transition:width .6s ease}
.empty{color:var(--ink2);font-size:14px;font-style:italic}
.hint{font-size:12.5px;color:var(--ink2);margin-top:12px}
@media(max-width:560px){header h1{font-size:25px}.meta div{padding:10px 14px}.scorecard .score{font-size:58px}.btn{padding:12px 18px;font-size:14px}}
</style></head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">AXISOLVE · 문법의 축</div>
    <h1>가정법 재시험</h1>
    <div class="sub">가정법 과거 · I wish · as if &nbsp;|&nbsp; 30문항</div>
    <div class="meta">
      <div><b>30</b><span>문항</span></div>
      <div><b>100</b><span>점 환산</span></div>
      <div><b>80</b><span>통과 기준</span></div>
    </div>
    <div class="namerow"><label for="sname">학생 이름</label>
      <input id="sname" type="text" value="심하은"></div>
  </header>
  <div id="result"></div>
  <div id="quiz"></div>
</div>
<div class="bar"><div class="inner">
  <div class="prog"><div class="ptrack"><div class="pfill" id="pfill"></div></div>
  <div class="ptxt" id="ptxt">0 / 30 응답</div></div>
  <button class="btn ghost" id="resetBtn" style="display:none" onclick="resetQuiz()">다시 풀기</button>
  <button class="btn" id="submitBtn" onclick="grade()" disabled>채점하기</button>
</div></div>
<script>
const DATA={"Q":[{"fmt":"빈칸","prompt":"If I ___ a bird, I would fly to you.","choices":["am","was","were","will be"],"ans":2,"code":"S","ex":"가정법 과거의 be동사는 인칭과 무관하게 were."},{"fmt":"빈칸","prompt":"If I had a million dollars, I ___ buy a house.","choices":["will","would","am going to","can"],"ans":1,"code":"T","ex":"가정법 과거 주절: would + 동사원형."},{"fmt":"빈칸","prompt":"If I ___ his phone number, I would call him.","choices":["know","knew","have known","knowing"],"ans":1,"code":"R","ex":"가정법 과거 if절의 일반동사는 과거형(knew)."},{"fmt":"빈칸","prompt":"I wish I ___ taller.","choices":["am","was","were","have been"],"ans":2,"code":"U","ex":"I wish + 가정법 과거. be동사는 were."},{"fmt":"빈칸","prompt":"He talks as if he ___ everything.","choices":["know","knows","knew","has known"],"ans":2,"code":"V","ex":"as if + 가정법 과거: 동사 과거형(knew)."},{"fmt":"빈칸","prompt":"If she studied harder, she ___ pass the exam.","choices":["will","would","shall","must"],"ans":1,"code":"T","ex":"가정법 과거 주절: would + 동사원형."},{"fmt":"빈칸","prompt":"I wish I ___ swim like a fish.","choices":["can","could","will","am able to"],"ans":1,"code":"U","ex":"I wish + 가정법 과거: 조동사 과거형 could."},{"fmt":"빈칸","prompt":"If I ___ enough time, I would help you.","choices":["have","had","will have","having"],"ans":1,"code":"R","ex":"가정법 과거 if절 동사 과거형(had)."},{"fmt":"빈칸","prompt":"She acts as if she ___ a queen.","choices":["is","was","were","be"],"ans":2,"code":"V","ex":"as if + 가정법 과거: be동사 were."},{"fmt":"빈칸","prompt":"If I knew the answer, I ___ tell you.","choices":["will","would","can","shall"],"ans":1,"code":"T","ex":"가정법 과거 주절: would + 동사원형."},{"fmt":"틀린 문장","prompt":"다음 중 어법상 <b>틀린</b> 것은?","choices":["If I had a car, I would drive.","If it rained, we would stay home.","If I have wings, I would fly.","If she were here, she would help."],"ans":2,"code":"R","ex":"have → had (가정법 과거 if절 동사 과거형)."},{"fmt":"틀린 문장","prompt":"다음 중 어법상 <b>틀린</b> 것은?","choices":["If I were rich, I would help others.","If he were tall, he would play.","If I was a bird, I would sing.","If they were free, they would come."],"ans":2,"code":"S","ex":"was → were (가정법 과거 be동사)."},{"fmt":"틀린 문장","prompt":"다음 중 어법상 <b>틀린</b> 것은?","choices":["If I knew, I would tell you.","If I had money, I will buy it.","If she tried, she would succeed.","If it were warm, we would swim."],"ans":1,"code":"T","ex":"will → would (가정법 과거 주절)."},{"fmt":"틀린 문장","prompt":"다음 중 어법상 <b>틀린</b> 것은?","choices":["I wish I were younger.","I wish I had a dog.","I wish I can fly.","I wish I knew her."],"ans":2,"code":"U","ex":"can → could (I wish + 가정법 과거)."},{"fmt":"틀린 문장","prompt":"다음 중 어법상 <b>틀린</b> 것은?","choices":["He talks as if he were rich.","She acts as if she knew it.","He speaks as if he is a teacher.","She smiles as if she were happy."],"ans":2,"code":"V","ex":"is → were (as if + 가정법 과거)."},{"fmt":"밑줄","prompt":"밑줄 친 부분 중 <b>틀린</b> 것은?","segs":[{"t":"If I ","u":false},{"t":"were","u":1},{"t":" ","u":false},{"t":"a","u":1},{"t":" ","u":false},{"t":"bird","u":1},{"t":", I ","u":false},{"t":"will","u":1},{"t":" ","u":false},{"t":"fly","u":1},{"t":".","u":false}],"ans":3,"code":"T","ex":"will → would (가정법 과거 주절)."},{"fmt":"밑줄","prompt":"밑줄 친 부분 중 <b>틀린</b> 것은?","segs":[{"t":"If she ","u":false},{"t":"was","u":1},{"t":" ","u":false},{"t":"here","u":1},{"t":", she ","u":false},{"t":"would","u":1},{"t":" ","u":false},{"t":"help","u":1},{"t":" ","u":false},{"t":"us","u":1},{"t":".","u":false}],"ans":0,"code":"S","ex":"was → were (가정법 과거 be동사)."},{"fmt":"밑줄","prompt":"밑줄 친 부분 중 <b>틀린</b> 것은?","segs":[{"t":"If I ","u":false},{"t":"know","u":1},{"t":" ","u":false},{"t":"his","u":1},{"t":" ","u":false},{"t":"address","u":1},{"t":", I ","u":false},{"t":"would","u":1},{"t":" ","u":false},{"t":"visit","u":1},{"t":" him.","u":false}],"ans":0,"code":"R","ex":"know → knew (if절 동사 과거형)."},{"fmt":"밑줄","prompt":"밑줄 친 부분 중 <b>틀린</b> 것은?","segs":[{"t":"I ","u":false},{"t":"wish","u":1},{"t":" ","u":false},{"t":"I","u":1},{"t":" ","u":false},{"t":"can","u":1},{"t":" ","u":false},{"t":"speak","u":1},{"t":" ","u":false},{"t":"French","u":1},{"t":".","u":false}],"ans":2,"code":"U","ex":"can → could (I wish + 가정법 과거)."},{"fmt":"밑줄","prompt":"밑줄 친 부분 중 <b>틀린</b> 것은?","segs":[{"t":"He ","u":false},{"t":"acts","u":1},{"t":" ","u":false},{"t":"as","u":1},{"t":" ","u":false},{"t":"if","u":1},{"t":" ","u":false},{"t":"he","u":1},{"t":" ","u":false},{"t":"is","u":1},{"t":" rich.","u":false}],"ans":4,"code":"V","ex":"is → were (as if + 가정법 과거)."},{"fmt":"옳은 문장","prompt":"다음 중 어법상 <b>옳은</b> 것은?","choices":["If I was you, I would study.","If I were you, I would study.","If I am you, I would study.","If I be you, I would study."],"ans":1,"code":"S","ex":"가정법 과거 be동사 were (If I were you)."},{"fmt":"옳은 문장","prompt":"다음 중 어법상 <b>옳은</b> 것은?","choices":["If I had time, I will help.","If I had time, I would helped.","If I had time, I would help.","If I had time, I help."],"ans":2,"code":"T","ex":"주절: would + 동사원형(help)."},{"fmt":"옳은 문장","prompt":"다음 중 어법상 <b>옳은</b> 것은?","choices":["If I knew it, I would tell you.","If I know it, I would tell you.","If I have known it, I would tell you.","If I knowing it, I would tell you."],"ans":0,"code":"R","ex":"if절 동사 과거형(knew)."},{"fmt":"옳은 문장","prompt":"다음 중 어법상 <b>옳은</b> 것은?","choices":["I wish I am rich.","I wish I was can swim.","I wish I could swim.","I wish I can swim."],"ans":2,"code":"U","ex":"I wish + 조동사 과거형 could."},{"fmt":"옳은 문장","prompt":"다음 중 어법상 <b>옳은</b> 것은?","choices":["She talks as if she is a doctor.","She talks as if she were a doctor.","She talks as if she be a doctor.","She talks as if she is being a doctor."],"ans":1,"code":"V","ex":"as if + 가정법 과거 were."},{"fmt":"의미 전환","prompt":"의미가 같도록 빈칸에 알맞은 것은?<br>“As I don't have money, I can't buy it.”","choices":["If I have money, I can buy it.","If I had money, I could buy it.","If I had money, I can buy it.","If I have money, I could buy it."],"ans":1,"code":"T","ex":"had + could 동사원형 (가정법 과거)."},{"fmt":"의미 전환","prompt":"의미가 같도록 알맞은 것은?<br>“I'm not you, so I won't go.”","choices":["If I were you, I would go.","If I am you, I will go.","If I were you, I will go.","If I was you, I would go."],"ans":0,"code":"S","ex":"were + would (가정법 과거)."},{"fmt":"의미 전환","prompt":"의미가 같도록 알맞은 것은?<br>“I'm sorry I can't drive.”","choices":["I wish I can drive.","I wish I could drive.","I hope I can drive.","I wish I drive."],"ans":1,"code":"U","ex":"I wish I could (현재 못함에 대한 아쉬움)."},{"fmt":"의미 전환","prompt":"의미가 같도록 알맞은 것은?<br>“In fact, he is not a king, but he behaves like one.”","choices":["He acts as if he is a king.","He acts as if he were a king.","He acts like he is a king now.","He acts as if he will be a king."],"ans":1,"code":"V","ex":"as if + 가정법 과거 were."},{"fmt":"의미 전환","prompt":"빈칸에 알맞은 것은?<br>“If she ___ the truth, she ___ be sad.”","choices":["knows / will","knew / would","know / would","knew / will"],"ans":1,"code":"R","ex":"if절 knew + 주절 would (가정법 과거)."}],"codeDesc":{"R":"가정법 과거 — if절 동사(일반동사) 과거형","S":"가정법 과거 — be동사 were","T":"가정법 과거 — 주절 「would/could + 동사원형」","U":"I wish + 가정법 과거","V":"as if + 가정법 과거"}};
const Q=DATA.Q, TOTAL=Q.length, PASS=80;
const MARK=["①","②","③","④","⑤"];
const CODES=["R","S","T","U","V"];
const CODECOLOR={R:"#b3502d",S:"#c08a2d",T:"#1f6a5e",U:"#3a5a8c",V:"#7a4e8c"};
const picks={}; let graded=false;
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stemSeg(segs){let mi=0,h='';segs.forEach(p=>{if(p.u){h+='<span class="seg-u"><span class="sup">'+MARK[mi]+'</span>'+esc(p.t)+'</span>';mi++;}else h+=esc(p.t);});return h;}
function optRow(qi,oi,text){return '<label class="opt" data-q="'+qi+'" data-o="'+oi+'"><input type="radio" name="q'+qi+'" value="'+oi+'" onchange="pick('+qi+','+oi+')"><span class="bul">'+MARK[oi]+'</span><span class="txt">'+text+'</span></label>';}
function render(){
  let h='';
  Q.forEach((q,qi)=>{
    h+='<div class="q" id="q'+qi+'"><div class="qhead"><span class="qnum">Q'+(qi+1)+'</span><span class="fmt">'+q.fmt+'</span></div>';
    if(q.segs){ h+='<div class="stem">'+stemSeg(q.segs)+'</div><div class="opts">';
      let n=q.segs.filter(x=>x.u).length;
      for(let oi=0;oi<n;oi++) h+=optRow(qi,oi,MARK[oi]+' 번');
    } else { h+='<div class="stem">'+q.prompt+'</div><div class="opts">';
      q.choices.forEach((c,oi)=> h+=optRow(qi,oi,esc(c)));
    }
    h+='</div><div class="explain"></div></div>';
  });
  document.getElementById('quiz').innerHTML=h;
}
function pick(qi,oi){if(graded)return;picks[qi]=oi;document.getElementById('q'+qi).classList.add('answered');updateProgress();}
function updateProgress(){const n=Object.keys(picks).length;
  document.getElementById('pfill').style.width=(n/TOTAL*100)+'%';
  document.getElementById('submitBtn').disabled=n<TOTAL;
  document.getElementById('ptxt').textContent=n<TOTAL?(n+' / '+TOTAL+' 응답 · 남은 '+(TOTAL-n)+'개'):(TOTAL+' / '+TOTAL+' 응답 완료');}
function grade(){
  if(Object.keys(picks).length<TOTAL){
    const first=[...Array(TOTAL).keys()].find(i=>picks[i]===undefined);
    const el=document.getElementById('q'+first);el.scrollIntoView({block:'center'});el.classList.add('flag');return;}
  graded=true;let correct=0;const cs={};CODES.forEach(c=>cs[c]={c:0,t:0});
  Q.forEach((q,qi)=>{
    const isC=picks[qi]===q.ans; if(isC)correct++;
    cs[q.code].t++; if(isC)cs[q.code].c++;
    const el=document.getElementById('q'+qi);el.classList.add('graded');el.classList.remove('flag');
    el.querySelectorAll('.opt').forEach(o=>{const oi=+o.dataset.o;if(oi===q.ans)o.classList.add('correct');else if(oi===picks[qi])o.classList.add('wrong');});
    el.querySelector('.explain').innerHTML='정답 <b>'+MARK[q.ans]+'</b> · <span class="fix">['+q.code+'] '+esc(q.ex)+'</span>';
  });
  const score=Math.round(correct/TOTAL*100), pass=score>=PASS;
  const name=(document.getElementById('sname').value||'').trim();
  let h='<div class="scorecard"><div class="label">'+(name?esc(name)+' · 가정법 재시험':'가정법 재시험')+'</div>';
  h+='<div class="score">'+score+'<small> / 100</small></div>';
  h+='<div class="verdict '+(pass?'pass':'fail')+'">'+(pass?'합격 · PASS':'불합격 · 재학습 필요')+'</div>';
  h+='<div class="meta2">정답 '+correct+' / '+TOTAL+' · 통과 기준 '+PASS+'점 ('+(pass?'+'+(score-PASS):'부족 '+(PASS-score))+'점)</div></div>';
  h+='<div class="block"><h3><span class="dot"></span>유형별 정답률</h3>';
  CODES.forEach(c=>{const st=cs[c],pct=st.t?Math.round(st.c/st.t*100):0;
    const col=pct>=80?'#1f6a5e':(pct>=60?'#c08a2d':'#b3502d');
    h+='<div class="area"><div class="top"><span><span class="cd" style="background:'+CODECOLOR[c]+'">'+c+'</span>'+esc(DATA.codeDesc[c])+'</span><span class="n">'+st.c+'/'+st.t+' · '+pct+'%</span></div><div class="track"><div class="fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';});
  h+='<div class="hint">정답률 60% 미만 유형은 우선 보충 대상입니다.</div></div>';
  const weak=CODES.filter(c=>cs[c].c<cs[c].t);
  h+='<div class="block"><h3><span class="dot"></span>약점 진단 (틀린 유형)</h3>';
  if(weak.length===0)h+='<p class="empty">틀린 유형이 없습니다. 가정법 전 항목을 통과했습니다.</p>';
  else{h+='<ul style="margin:0;padding-left:18px;font-size:14px;line-height:1.9">';
    weak.forEach(c=>{const st=cs[c];h+='<li><b>['+c+']</b> '+esc(DATA.codeDesc[c])+' — 오답 '+(st.t-st.c)+'/'+st.t+'</li>';});
    h+='</ul><div class="hint">위 유형의 보충 워크시트 학습 후 재점검을 권장합니다.</div>';}
  h+='</div>';
  const res=document.getElementById('result');res.innerHTML=h;res.style.display='block';
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('resetBtn').style.display='inline-block';
  document.getElementById('pfill').style.width='100%';
  document.getElementById('ptxt').textContent='채점 완료 · '+score+'점';
  res.scrollIntoView({behavior:'smooth',block:'start'});
}
function resetQuiz(){for(const k in picks)delete picks[k];graded=false;
  document.getElementById('result').style.display='none';
  document.getElementById('submitBtn').style.display='inline-block';
  document.getElementById('resetBtn').style.display='none';
  render();updateProgress();window.scrollTo({top:0,behavior:'smooth'});}
render();updateProgress();
</script></body></html>
