<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXISOLVE 진단평가 · 관계사·비교급·가정법</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4efe6; --paper2:#ece4d5; --ink:#211d18; --ink2:#5a5247;
  --line:#d6ccb8; --accent:#b3502d; --accent2:#1f6a5e; --gold:#c08a2d;
  --ok:#1f6a5e; --no:#b3502d; --card:#fbf8f1;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'IBM Plex Sans KR',sans-serif; color:var(--ink);
  background:
    radial-gradient(circle at 12% 0%, rgba(192,138,45,.07), transparent 40%),
    radial-gradient(circle at 88% 8%, rgba(31,106,94,.06), transparent 42%),
    var(--paper);
  line-height:1.6; padding-bottom:140px;
}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}

/* header */
header{padding:54px 0 30px;text-align:center;position:relative}
header .kicker{font-family:'Fraunces',serif;letter-spacing:.42em;font-size:12px;
  text-transform:uppercase;color:var(--accent);font-weight:600}
header h1{font-family:'Gowun Batang',serif;font-weight:700;font-size:34px;
  margin:10px 0 4px;letter-spacing:-.5px}
header .sub{color:var(--ink2);font-size:15px}
.meta{display:flex;justify-content:center;gap:0;margin-top:22px;flex-wrap:wrap;
  border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card)}
.meta div{padding:12px 22px;border-right:1px solid var(--line);text-align:center}
.meta div:last-child{border-right:none}
.meta b{display:block;font-family:'Fraunces',serif;font-size:22px;color:var(--accent2)}
.meta span{font-size:12px;color:var(--ink2);letter-spacing:.05em}

.namerow{display:flex;align-items:center;gap:10px;margin:26px 0 6px}
.namerow label{font-weight:600;font-size:14px;white-space:nowrap}
.namerow input{flex:1;border:none;border-bottom:1.5px solid var(--line);
  background:transparent;font-family:inherit;font-size:15px;padding:8px 4px;color:var(--ink)}
.namerow input:focus{outline:none;border-color:var(--accent)}

/* section heading */
.shead{display:flex;align-items:baseline;gap:12px;margin:40px 0 8px;
  padding-bottom:10px;border-bottom:2px solid var(--ink)}
.shead .tag{font-family:'Fraunces',serif;font-weight:600;background:var(--ink);
  color:var(--paper);font-size:13px;padding:3px 12px;border-radius:20px;letter-spacing:.08em}
.shead h2{font-family:'Gowun Batang',serif;font-size:19px;font-weight:700}

/* question card */
.q{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:18px 20px;margin:16px 0;transition:border-color .25s, box-shadow .25s}
.q.answered{border-color:var(--accent2)}
.q.flag{box-shadow:0 0 0 2px rgba(179,80,45,.25)}
.qnum{font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--accent);
  letter-spacing:.1em}
.stem{font-size:16px;margin:6px 0 12px;font-family:'IBM Plex Sans KR'}
.seg-u{border-bottom:1.6px solid var(--ink);padding:0 1px;position:relative;white-space:nowrap}
.seg-u .sup{font-family:'Fraunces',serif;font-size:.62em;color:var(--accent);
  vertical-align:super;margin-right:1px;font-weight:600}
.opt{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:9px;
  cursor:pointer;transition:background .15s;font-size:15px}
.opt:hover{background:var(--paper2)}
.opt input{display:none}
.bul{font-family:'Fraunces',serif;flex:0 0 auto;width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--line);display:grid;place-items:center;font-size:13px;
  color:var(--ink2);transition:all .15s;margin-top:1px}
.opt input:checked + .bul{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.opt .txt{flex:1}
/* result states (after grading) */
.q.graded .opt{cursor:default}
.q.graded .opt:hover{background:transparent}
.opt.correct .bul{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.correct{background:rgba(31,106,94,.08)}
.opt.wrong .bul{background:var(--no);border-color:var(--no);color:#fff}
.opt.wrong{background:rgba(179,80,45,.08)}
.explain{margin-top:10px;padding:10px 14px;border-left:3px solid var(--accent2);
  background:var(--paper2);border-radius:0 8px 8px 0;font-size:13.5px;display:none}
.q.graded .explain{display:block}
.explain b{color:var(--accent2)}
.explain .fix{font-family:'Fraunces',serif;color:var(--no)}

/* footer bar */
.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(33,29,24,.96);
  backdrop-filter:blur(8px);color:var(--paper);padding:14px 20px;z-index:50}
.bar .inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:16px}
.prog{flex:1}
.prog .ptrack{height:6px;background:rgba(255,255,255,.18);border-radius:6px;overflow:hidden}
.prog .pfill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--accent));
  border-radius:6px;transition:width .3s}
.prog .ptxt{font-size:12px;margin-top:5px;color:#cfc6b6}
.btn{font-family:'IBM Plex Sans KR';font-weight:600;font-size:15px;border:none;cursor:pointer;
  padding:13px 26px;border-radius:30px;background:var(--gold);color:#211d18;transition:transform .12s,opacity .2s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.ghost{background:transparent;color:var(--paper);border:1.4px solid rgba(255,255,255,.4)}

/* result panel */
#result{display:none;margin:34px 0 10px}
.scorecard{background:var(--ink);color:var(--paper);border-radius:20px;padding:34px 30px;
  text-align:center;position:relative;overflow:hidden}
.scorecard::after{content:"AXIS";position:absolute;right:-10px;bottom:-22px;
  font-family:'Fraunces',serif;font-size:120px;font-weight:600;opacity:.06;letter-spacing:-.04em}
.scorecard .label{font-family:'Fraunces',serif;letter-spacing:.3em;font-size:12px;color:var(--gold);text-transform:uppercase}
.scorecard .score{font-family:'Fraunces',serif;font-size:74px;line-height:1;margin:8px 0;font-weight:600}
.scorecard .score small{font-size:26px;opacity:.55}
.verdict{display:inline-block;margin-top:6px;padding:6px 20px;border-radius:24px;
  font-weight:700;font-size:15px;letter-spacing:.05em}
.verdict.pass{background:var(--accent2);color:#fff}
.verdict.fail{background:var(--accent);color:#fff}
.scorecard .meta2{margin-top:14px;font-size:13px;color:#cfc6b6}

.block{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin-top:18px}
.block h3{font-family:'Gowun Batang',serif;font-size:17px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.block h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* area bars */
.area{margin:11px 0}
.area .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px}
.area .top b{font-weight:600}
.area .top .n{font-family:'Fraunces',serif;color:var(--ink2)}
.area .track{height:9px;background:var(--paper2);border-radius:6px;overflow:hidden}
.area .fill{height:100%;border-radius:6px;transition:width .6s ease}

/* weakness table */
.wk{width:100%;border-collapse:collapse;font-size:13px}
.wk th,.wk td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:top}
.wk th{font-family:'Fraunces',serif;font-weight:600;color:var(--ink2);font-size:12px;letter-spacing:.04em}
.wk td.c{text-align:center;font-family:'Fraunces',serif}
.wk .code{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;
  border-radius:6px;background:var(--ink);color:var(--paper);font-family:'Fraunces',serif;font-size:12px}
.wk tr.weak td{background:rgba(179,80,45,.07)}
.wk .miss{color:var(--no);font-weight:700}
.wk .full{color:var(--ok);font-weight:700}
.empty{color:var(--ink2);font-size:14px;font-style:italic}
.hint{font-size:12.5px;color:var(--ink2);margin-top:12px}
@media(max-width:560px){
  header h1{font-size:27px} .meta div{padding:10px 14px}
  .scorecard .score{font-size:58px} .bar .inner{gap:10px}
  .btn{padding:12px 18px;font-size:14px}
}
</style>
</head>

<div class="wrap">
  <header>

</div></div>

const MARK = ["①","②","③","④","⑤"];
const AREAS = ["관계대명사","관계부사","비교급","가정법"];
const AREA_COLOR = {"관계대명사":"#b3502d","관계부사":"#c08a2d","비교급":"#1f6a5e","가정법":"#3a5a8c"};
const picks = {};   // qIndex(0-49) -> choice(0-4)
let graded = false;

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildStem2(segs){
  let mi=0, html='';
  segs.forEach(p=>{
    if(p.u){ html+='<span class="seg-u"><span class="sup">'+MARK[mi]+'</span>'+esc(p.t)+'</span>'; mi++; }
    else html+=esc(p.t);
  });
  return html;
}
function optionRow(qi, oi, text){
  return '<label class="opt" data-q="'+qi+'" data-o="'+oi+'">'
    +'<input type="radio" name="q'+qi+'" value="'+oi+'" onchange="pick('+qi+','+oi+')">'
    +'<span class="bul">'+MARK[oi]+'</span><span class="txt">'+text+'</span></label>';
}

function render(){
  const quiz=document.getElementById('quiz');
  let h='';
  // Section 1
  h+='<div class="shead"><span class="tag">유형 1</span><h2>어법상 틀린 문장을 고르시오.</h2></div>';
  DATA.TYPE1.forEach((choices,i)=>{
    const qi=i;
    h+='<div class="q" id="q'+qi+'"><div class="qnum">Q'+(qi+1)+'</div>';
    h+='<div class="opts">';
    choices.forEach((c,oi)=> h+=optionRow(qi,oi, esc(c)));
    h+='</div><div class="explain"></div></div>';
  });
  // Section 2
  h+='<div class="shead"><span class="tag">유형 2</span><h2>밑줄 친 부분 중 틀린 것을 고르시오.</h2></div>';
  DATA.T2.forEach((segs,i)=>{
    const qi=25+i;
    h+='<div class="q" id="q'+qi+'"><div class="qnum">Q'+(qi+1)+'</div>';
    h+='<div class="stem">'+buildStem2(segs)+'</div><div class="opts">';
    for(let oi=0;oi<5;oi++) h+=optionRow(qi,oi, MARK[oi]+' 번');
    h+='</div><div class="explain"></div></div>';
  });
  quiz.innerHTML=h;
}

function pick(qi,oi){
  if(graded) return;
  picks[qi]=oi;
  document.getElementById('q'+qi).classList.add('answered');
  updateProgress();
}
function updateProgress(){
  const n=Object.keys(picks).length;
  document.getElementById('pfill').style.width=(n/50*100)+'%';
  document.getElementById('ptxt').textContent=n+' / 50 응답';
  document.getElementById('submitBtn').disabled = n<50;
  document.getElementById('ptxt').textContent = n<50 ? (n+' / 50 응답 · 남은 '+(50-n)+'개') : '50 / 50 응답 완료';
}

function grade(){
  if(Object.keys(picks).length<50){
    const first=[...Array(50).keys()].find(i=>picks[i]===undefined);
    document.getElementById('q'+first).scrollIntoView({block:'center'});
    document.getElementById('q'+first).classList.add('flag');
    return;
  }
  graded=true;
  let correct=0;
  const areaStat={}; AREAS.forEach(a=>areaStat[a]={c:0,t:0});
  const codeStat={};

  DATA.ANS.forEach((a,qi)=>{
    const ans=a[0]-1, area=a[1], code=a[2], fix=a[3], diag=a[4];
    const sel=picks[qi];
    const isC = sel===ans;
    if(isC) correct++;
    areaStat[area].t++; if(isC) areaStat[area].c++;
    if(!codeStat[code]) codeStat[code]={c:0,t:0,area:area};
    codeStat[code].t++; if(isC) codeStat[code].c++;

    // mark options
    const qel=document.getElementById('q'+qi);
    qel.classList.add('graded'); qel.classList.remove('flag');
    qel.querySelectorAll('.opt').forEach(o=>{
      const oi=+o.dataset.o;
      if(oi===ans) o.classList.add('correct');
      else if(oi===sel) o.classList.add('wrong');
    });
    const ex=qel.querySelector('.explain');
    ex.innerHTML = '정답 <b>'+MARK[ans]+'</b> · <span class="fix">'+esc(fix)+'</span><br>'
      +'<b>['+area+'·'+code+']</b> '+esc(diag);
  });

  const score=correct*2;
  const pass=score>=80;
  const name=(document.getElementById('sname').value||'').trim();

  // build result
  let h='';
  h+='<div class="scorecard"><div class="label">'+(name?esc(name)+' 님의 결과':'진단 결과')+'</div>';
  h+='<div class="score">'+score+'<small> / 100</small></div>';
  h+='<div class="verdict '+(pass?'pass':'fail')+'">'+(pass?'합격 · PASS':'불합격 · 재학습 필요')+'</div>';
  h+='<div class="meta2">정답 '+correct+' / 50 · 통과 기준 80점 ('+(pass?'+'+(score-80):'부족 '+(80-score))+'점)</div></div>';

  // area breakdown
  h+='<div class="block"><h3><span class="dot"></span>영역별 정답률</h3>';
  AREAS.forEach(a=>{
    const s=areaStat[a], pct=Math.round(s.c/s.t*100);
    const col = pct>=80?'#1f6a5e':(pct>=60?'#c08a2d':'#b3502d');
    h+='<div class="area"><div class="top"><b>'+a+'</b><span class="n">'+s.c+'/'+s.t+' · '+pct+'%</span></div>'
      +'<div class="track"><div class="fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
  });
  h+='<div class="hint">정답률 60% 미만 영역은 우선 보충 대상입니다.</div></div>';

  // weakness table
  const codes=Object.keys(DATA.codeDesc);
  const weak=codes.filter(c=>codeStat[c] && codeStat[c].c<codeStat[c].t);
  h+='<div class="block"><h3><span class="dot"></span>약점 진단 (틀린 세부 항목)</h3>';
  if(weak.length===0){
    h+='<p class="empty">틀린 항목이 없습니다. 모든 진단 코드를 통과했습니다.</p>';
  } else {
    h+='<table class="wk"><thead><tr><th>코드</th><th>영역</th><th>세부 진단 항목</th><th style="text-align:center">오답</th></tr></thead><tbody>';
    weak.forEach(c=>{
      const st=codeStat[c], miss=st.t-st.c;
      h+='<tr class="weak"><td class="c"><span class="code">'+c+'</span></td><td>'+st.area+'</td>'
        +'<td>'+esc(DATA.codeDesc[c])+'</td><td class="c miss">'+miss+'/'+st.t+'</td></tr>';
    });
    h+='</tbody></table><div class="hint">위 항목 순서대로 보충 학습을 권장합니다. 아래 문항별 해설에서 정답·근거를 확인하세요.</div>';
  }
  h+='</div>';

  const res=document.getElementById('result');
  res.innerHTML=h; res.style.display='block';
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('resetBtn').style.display='inline-block';
  document.getElementById('pfill').style.width='100%';
  document.getElementById('ptxt').textContent='채점 완료 · '+score+'점';
  res.scrollIntoView({behavior:'smooth',block:'start'});
}

function resetQuiz(){
  for(const k in picks) delete picks[k];
  graded=false;
  document.getElementById('result').style.display='none';
  document.getElementById('submitBtn').style.display='inline-block';
  document.getElementById('resetBtn').style.display='none';
  render();
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
updateProgress();
</script>
